<?xml version="1.0" encoding="UTF-8"?>
<svg width="456" height="456" viewBox="0 0 456 456" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonCyan" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonMagenta" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>
  <g transform="translate(0,8)">
    <!-- Open book (base) -->
    <path d="M108 312 L228 268 L348 312 L348 352 L228 308 L108 352 Z" fill="url(#bookGrad)" opacity="0.95"/>
    <path d="M228 268 L228 308 M108 312 L108 352 M348 312 L348 352" stroke="#22d3ee" stroke-width="3" fill="none" filter="url(#neonCyan)" opacity="0.85"/>
    <!-- Book pages hint -->
    <path d="M130 318 L210 290 M286 290 L366 318" stroke="#64748b" stroke-width="2" fill="none" opacity="0.7"/>
    <!-- Progression arrow from book -->
    <path d="M228 268 L228 158 M198 188 L228 148 L258 188" stroke="#22d3ee" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonCyan)"/>
    <!-- Geometric fox (triangles) rising from book -->
    <g filter="url(#neonMagenta)">
      <path d="M228 248 L168 188 L198 168 Z" fill="#c084fc" opacity="0.95"/>
      <path d="M228 248 L288 188 L258 168 Z" fill="#a855f7" opacity="0.95"/>
      <path d="M228 248 L228 178 L198 208 Z" fill="#e9d5ff" opacity="0.9"/>
      <path d="M228 248 L228 178 L258 208 Z" fill="#ddd6fe" opacity="0.85"/>
    </g>
    <!-- Snout -->
    <path d="M218 220 L228 238 L238 220 Z" fill="#f8fafc" opacity="0.95"/>
    <!-- Eye accents -->
    <circle cx="208" cy="200" r="5" fill="#22d3ee"/>
    <circle cx="248" cy="200" r="5" fill="#22d3ee"/>
  </g>
</svg>
